<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#0b1120"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">PulseLite — Architecture (C4 Level 1)</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">Real-time Hacker News intelligence pipeline</text>

  <!-- Source -->
  <rect x="500" y="95" width="200" height="55" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Hacker News API</text>
  <text x="600" y="136" text-anchor="middle" font-size="10" fill="#94a3b8">public, no auth</text>

  <!-- Producers -->
  <rect x="330" y="200" width="220" height="60" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Producer: New Stories</text>
  <text x="440" y="243" text-anchor="middle" font-size="10" fill="#94a3b8">reddit_producer.py · polls every 30s</text>

  <rect x="650" y="200" width="220" height="60" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="760" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Producer: Top Stories</text>
  <text x="760" y="243" text-anchor="middle" font-size="10" fill="#94a3b8">top_producer.py · polls every 30s</text>

  <!-- Schema Registry -->
  <rect x="960" y="200" width="200" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="1060" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Schema Registry</text>
  <text x="1060" y="243" text-anchor="middle" font-size="10" fill="#94a3b8">Avro validation · :8081</text>

  <!-- Kafka topics -->
  <rect x="330" y="310" width="220" height="55" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="440" y="333" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Kafka Topic</text>
  <text x="440" y="351" text-anchor="middle" font-size="11" fill="#22d3ee">hn-posts</text>

  <rect x="650" y="310" width="220" height="55" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="760" y="333" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Kafka Topic</text>
  <text x="760" y="351" text-anchor="middle" font-size="11" fill="#22d3ee">hn-top</text>

  <!-- Processor -->
  <rect x="230" y="415" width="260" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Stream Processor</text>
  <text x="360" y="457" text-anchor="middle" font-size="10" fill="#94a3b8">spark_processor.py</text>
  <text x="360" y="473" text-anchor="middle" font-size="10" fill="#94a3b8">VADER sentiment · volume · anomalies · drift</text>
  <text x="360" y="488" text-anchor="middle" font-size="10" fill="#94a3b8">manual offset commit → crash-safe</text>

  <!-- Stream join -->
  <rect x="530" y="415" width="260" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Stream Join</text>
  <text x="660" y="457" text-anchor="middle" font-size="10" fill="#94a3b8">stream_join.py</text>
  <text x="660" y="473" text-anchor="middle" font-size="10" fill="#94a3b8">Pearson correlation between topics</text>

  <!-- Digest generator -->
  <rect x="830" y="415" width="230" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="945" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Pulse Digest</text>
  <text x="945" y="457" text-anchor="middle" font-size="10" fill="#94a3b8">digest_generator.py</text>
  <text x="945" y="473" text-anchor="middle" font-size="10" fill="#94a3b8">Claude Haiku, rule-based fallback</text>
  <text x="945" y="488" text-anchor="middle" font-size="10" fill="#94a3b8">refreshes every 5 min</text>

  <!-- Discord alert -->
  <rect x="80" y="415" width="130" height="80" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="145" y="445" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Discord</text>
  <text x="145" y="461" text-anchor="middle" font-size="12" font-weight="600" fill="#f1f5f9">Webhook</text>
  <text x="145" y="479" text-anchor="middle" font-size="9" fill="#94a3b8">on anomaly</text>

  <!-- CSV storage -->
  <rect x="330" y="540" width="540" height="60" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="565" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">CSV Storage</text>
  <text x="600" y="583" text-anchor="middle" font-size="10" fill="#94a3b8">data_posts · data_volume · data_alerts · data_drift · data_correlation · data_digest</text>

  <!-- Dashboards -->
  <rect x="280" y="645" width="260" height="70" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="672" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Streamlit Dashboard</text>
  <text x="410" y="689" text-anchor="middle" font-size="10" fill="#94a3b8">dashboard/app.py · deployed on Cloud</text>

  <rect x="640" y="645" width="260" height="70" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="770" y="672" text-anchor="middle" font-size="13" font-weight="600" fill="#f1f5f9">Flask Dashboard</text>
  <text x="770" y="689" text-anchor="middle" font-size="10" fill="#94a3b8">flask_dashboard/app.py · local</text>

  <!-- User -->
  <text x="600" y="745" text-anchor="middle" font-size="20">👤</text>
  <text x="640" y="748" font-size="12" fill="#94a3b8">User</text>

  <!-- Arrows -->
  <path d="M560,140 L460,200" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M640,140 L750,200" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M700,120 L960,220" stroke="#f59e0b" stroke-width="1.2" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <path d="M440,260 L440,310" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M760,260 L760,310" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M420,365 L380,415" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M460,365 L620,415" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M740,365 L680,415" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M780,365 L900,415" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M300,455 L210,460" stroke="#f43f5e" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <path d="M360,495 L450,540" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M660,495 L600,540" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M945,495 L750,540" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M480,600 L410,645" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M720,600 L770,645" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M500,715 L610,735" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M700,715 L640,735" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="20" y="20" width="14" height="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="40" y="31" font-size="10" fill="#94a3b8">async / side-effect path</text>
</svg>
